<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>兔彼樂｜後台管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--g:#006400;--gm:#228B22;--gl:#52BE80;--gp:#E8F8E8;--pk:#ffc0cb;--pkp:#fff0f3;--bl:#87cefa;--blp:#e8f4fd;--wh:#fff;--dk:#1a2e1a;--md:#4a6741;--lt:#f0f7f0;--rd:#C0392B;--rdp:#fdecea;--yl:#E67E22;--ylp:#fef5e7;--gd:#B8860B;--r:12px;--sh:0 2px 14px rgba(0,100,0,.09)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--lt);color:var(--dk);min-height:100vh;font-size:16px}
.ov{position:fixed;inset:0;background:rgba(0,50,0,.6);display:none;align-items:center;justify-content:center;z-index:9999}.ov.on{display:flex}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--pk);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--dk);color:var(--gl);padding:11px 22px;border-radius:22px;font-size:15px;font-weight:700;z-index:500;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none}.toast.on{opacity:1}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:200;display:none;align-items:flex-end}.modal.on{display:flex}
.mbox{background:var(--wh);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 16px 40px}
.mh{width:36px;height:4px;background:#c8d9c8;border-radius:2px;margin:0 auto 16px}
.mt{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;color:var(--dk);margin-bottom:14px}
/* 登入 */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#002200,var(--g))}
.login-box{background:var(--wh);border-radius:20px;padding:36px 24px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.login-logo{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:900;color:var(--g);text-align:center;margin-bottom:4px}
.login-sub{font-size:14px;color:var(--md);text-align:center;margin-bottom:24px}
.login-input{width:100%;padding:14px 15px;border:1.5px solid #c8ddc8;border-radius:10px;font-size:15px;font-family:'Noto Sans TC',sans-serif;outline:none;margin-bottom:12px}
.login-input:focus{border-color:var(--g)}
.login-btn{width:100%;padding:15px;background:var(--g);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer}
/* 頂部 */
.topbar{background:var(--dk);padding:0 14px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.tb-logo{font-family:'Noto Serif TC',serif;font-size:16px;font-weight:900;color:var(--gl)}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-btn{padding:10px 14px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:'Noto Sans TC',sans-serif;white-space:nowrap;min-height:42px}
.tb-g{background:var(--g);color:#fff}.tb-pk{background:var(--pk);color:var(--dk)}.tb-ghost{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)}
.tb-user{font-size:15px;color:rgba(255,255,255,.6);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* 主內容 */
.main{padding:12px;max-width:900px;margin:0 auto;padding-bottom:80px}
.card{background:var(--wh);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh)}
.card-t{font-size:14px;font-weight:700;color:var(--md);margin-bottom:10px;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center}
/* ══ 儀表板：一行一場 ══ */
.session-row{background:var(--wh);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--sh);overflow:hidden;border-left:4px solid var(--g)}
.sr-header{display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:13px 14px;cursor:pointer;gap:10px;min-height:56px}
.sr-date{font-size:15px;font-weight:700;color:var(--md);white-space:nowrap}
.sr-name{font-size:14px;font-weight:700;color:var(--dk)}
.sr-name small{font-size:14px;color:var(--md);font-weight:400;display:block;margin-top:1px}
.sr-arrow{font-size:16px;color:var(--md);transition:transform .2s}
.sr-arrow.open{transform:rotate(90deg)}
/* 統計 chips */
.stat-chips{display:flex;flex-wrap:wrap;gap:5px;padding:0 14px 11px}
.sc{font-size:13px;padding:6px 12px;border-radius:12px;font-weight:700;white-space:nowrap;cursor:pointer;min-height:34px;display:inline-flex;align-items:center}
.sc-total{background:#f0f7f0;color:var(--g)}
.sc-pending{background:var(--ylp);color:var(--yl)}
.sc-paid{background:var(--gp);color:var(--gm)}
.sc-remain{background:var(--blp);color:#2980B9}
.sc-income{background:var(--gp);color:var(--g)}
.sc-equip{background:#f5f0ff;color:#7b4fa5}
/* 展開內容 */
.sr-body{display:none;border-top:1px solid var(--gp)}
.sr-body.open{display:block}
/* 篩選 */
.filters{display:flex;gap:6px;overflow-x:auto;padding:10px 14px 0;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.ftab{padding:10px 18px;border-radius:22px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;border:1.5px solid #c8ddc8;color:var(--md);background:var(--wh);min-height:44px;display:inline-flex;align-items:center}
.ftab.on{border-color:var(--g);background:var(--g);color:#fff}
/* 攤商卡 */
.vendor-card{background:var(--wh);border-radius:10px;padding:12px;margin:8px 14px;box-shadow:0 1px 6px rgba(0,0,0,.06);border-left:4px solid transparent}
.vc-pending{border-left-color:var(--yl);background:var(--ylp)}
.vc-accepted{border-left-color:var(--g)}
.vc-paid{border-left-color:var(--gm);background:var(--gp)}
.vc-overdue{border-left-color:var(--rd);background:var(--rdp)}
.vc-waitlist{border-left-color:var(--bl);background:var(--blp)}
.vc-rejected{border-left-color:#ccc}
.v-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;gap:8px}
.v-brand{font-size:14px;font-weight:700;flex:1}
.badge{font-size:14px;padding:3px 8px;border-radius:10px;font-weight:700;white-space:nowrap}
.b-pending{background:var(--ylp);color:var(--yl)}.b-accepted{background:var(--gp);color:var(--g)}.b-paid{background:var(--gp);color:var(--gm)}.b-overdue{background:var(--rdp);color:var(--rd)}.b-waitlist{background:var(--blp);color:#2980B9}.b-rejected{background:#f2f3f4;color:#888}
.v-info{font-size:15px;color:var(--md);line-height:1.8}
.act-row{display:flex;gap:7px;margin-top:10px}
.act-btn{flex:1;padding:14px 8px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;min-height:50px}
.act-accept{background:var(--g);color:#fff}
.act-wait{background:var(--bl);color:var(--dk)}
.act-reject{background:#e0e0e0;color:#666}
/* 報到卡 */
.ci-card{background:var(--wh);border-radius:10px;padding:12px;margin:8px 14px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 6px rgba(0,0,0,.06);gap:10px}
.ci-booth{font-size:20px;font-weight:900;color:var(--gd);font-family:'Noto Serif TC',serif;min-width:40px}
.ci-info{flex:1;min-width:0}
.ci-brand{font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ci-time{font-size:14px;color:var(--md)}
.ci-actions{display:flex;flex-direction:column;gap:5px;align-items:flex-end}
.ci-badge{font-size:14px;padding:3px 8px;border-radius:10px;font-weight:700;display:inline-block}
.ci-wait{background:var(--ylp);color:var(--yl)}.ci-in{background:var(--gp);color:var(--g)}.ci-out{background:var(--blp);color:#2980B9}
.btn-xs{padding:11px 16px;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;white-space:nowrap;min-height:44px;display:inline-flex;align-items:center}
/* 表單 */
label{display:block;font-size:14px;font-weight:700;color:var(--md);margin-bottom:5px;margin-top:13px}
input[type=text],input[type=number],input[type=email],input[type=date],input[type=time],input[type=url],select,textarea{width:100%;padding:12px 13px;border:1.5px solid #c8ddc8;border-radius:9px;font-size:16px;font-family:'Noto Sans TC',sans-serif;color:var(--dk);background:var(--wh);outline:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--g)}
textarea{resize:vertical;min-height:72px;line-height:1.6}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.btn{width:100%;padding:16px;border:none;border-radius:var(--r);font-size:16px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;min-height:48px}
.btn-p{background:var(--g);color:#fff}.btn-s{background:transparent;color:var(--g);border:1.5px solid var(--g)}.btn-pk{background:var(--pk);color:var(--dk)}.btn-rd{background:var(--rd);color:#fff}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.empty{text-align:center;padding:28px;color:var(--md);font-size:15px}
.divider{height:1px;background:var(--gp);margin:14px 0}
/* 設備勾選 */
.eq-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mod-label{display:flex;align-items:center;gap:7px;font-size:14px;padding:9px 13px;background:var(--lt);border-radius:9px;cursor:pointer;margin-top:0;border:1.5px solid transparent}
.mod-label:has(.mod-cb:checked){background:var(--gp);border-color:var(--g)}
.mod-cb{width:16px;height:16px;accent-color:var(--g);flex-shrink:0}
.eq-item{display:flex;align-items:center;gap:8px;padding:10px;background:var(--lt);border-radius:9px;border:1.5px solid transparent}
.eq-item.on{border-color:var(--g);background:var(--gp)}
.eq-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--g);flex-shrink:0}
.eq-name{font-size:14px;flex:1}
.eq-price{width:65px;padding:6px 8px !important;font-size:14px !important;margin-top:0 !important}
/* 下載 */
.dl-btn{display:flex;align-items:center;gap:12px;padding:14px;background:var(--wh);border:1px solid var(--gp);border-radius:10px;cursor:pointer;margin-bottom:8px;font-size:15px;font-weight:700;color:var(--dk);min-height:52px}
.dl-btn:hover,.dl-btn:active{background:var(--gp)}
.dl-ic{font-size:22px}
/* 公告 */
.ann-item{background:var(--wh);border-radius:10px;padding:12px;margin-bottom:8px;box-shadow:var(--sh);border-left:3px solid var(--g)}
/* 底部導航 */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--dk);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;cursor:pointer;color:rgba(255,255,255,.5);font-size:14px;gap:2px;border:none;background:none;font-family:'Noto Sans TC',sans-serif;min-height:52px}
.bn-item.on{color:var(--gl)}
.bn-ic{font-size:20px}
/* 空白場次提示 */
.no-sessions{text-align:center;padding:40px 20px;color:var(--md)}
.ns-ic{font-size:48px;margin-bottom:12px}
.ns-t{font-size:16px;font-weight:700;margin-bottom:8px}
.ns-s{font-size:15px;line-height:1.6}
</style>
</head>
<body>
<div class="ov" id="ov"><div class="spin"></div></div>
<div class="toast" id="toast"></div>

<!-- 登入頁 -->
<div id="loginPage">
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">🐰 兔彼樂後台</div>
      <div class="login-sub">輸入管理員 Email 登入</div>
      <input type="email" class="login-input" id="adminEmail" placeholder="管理員 Email" inputmode="email" onkeydown="if(event.key==='Enter')doAdminLogin()">
      <button class="login-btn" onclick="doAdminLogin()">登入</button>
      <div id="loginErr" style="font-size:14px;color:var(--rd);text-align:center;margin-top:10px;display:none"></div>
    </div>
  </div>
</div>

<!-- 主介面 -->
<div id="mainApp" style="display:none">
  <div class="topbar">
    <div class="tb-logo">🐰 兔彼樂後台</div>
    <div class="tb-right">
      <span class="tb-user" id="adminNameDisplay"></span>
      <a href="index.html" class="tb-btn" style="background:var(--gp);color:var(--g);text-decoration:none;font-size:13px;padding:8px 12px">🏠 前台</a>
      <button class="tb-btn tb-ghost" onclick="doLogout()" style="font-size:15px;padding:7px 10px">登出</button>
    </div>
  </div>

  <div class="main" id="mainContent">
    <!-- 動態內容 -->
  </div>

  <!-- 底部導航 -->
  <div class="bottom-nav">
    <button class="bn-item on" id="nav-dash" onclick="switchTab('dash')"><span class="bn-ic">📊</span>儀表板</button>
    <button class="bn-item" id="nav-sessions" onclick="switchTab('sessions')"><span class="bn-ic">📅</span>場次</button>
    <button class="bn-item" id="nav-checkin" onclick="switchTab('checkin')"><span class="bn-ic">✅</span>報到</button>
    <button class="bn-item" id="nav-tools" onclick="switchTab('tools')"><span class="bn-ic">⚙️</span>工具</button>
  </div>
</div>

<!-- ══ 浮層群 ══ -->

<!-- 新增場次 -->
<div class="modal" id="mNewSession" onclick="if(event.target===this)closeModal('mNewSession')">
<div class="mbox">
  <div class="mh"></div>
  <div class="mt" id="mNewSessionTitle">新增場次</div>

  <!-- 基本資訊 -->
  <div class="fg2">
    <div><label>場次名稱 *</label><input type="text" id="ns_name" placeholder="例：耶市集07月"></div>
    <div><label>活動類型 *</label>
      <select id="ns_type" onchange="updateFormModulesByType()">
        <option value="攤商招募">🏪 攤商招募</option>
        <option value="活動報名">🎨 活動報名</option>
        <option value="合作申請">🎭 合作申請</option>
        <option value="商場百貨寄賣">🏬 商場百貨寄賣</option>
      </select>
    </div>
  </div>
  <label>場次說明</label>
  <textarea id="ns_intro" placeholder="給報名者看的活動介紹..."></textarea>

  <!-- 活動地點 -->
  <div class="fg2">
    <div><label>活動地 *</label>
      <select id="ns_city">
        <option value="基隆市">基隆市</option><option value="台北市">台北市</option>
        <option value="新北市">新北市</option><option value="桃園市">桃園市</option>
        <option value="新竹市">新竹市</option><option value="新竹縣">新竹縣</option>
        <option value="苗栗縣">苗栗縣</option><option value="台中市">台中市</option>
        <option value="彰化縣">彰化縣</option><option value="南投縣">南投縣</option>
        <option value="雲林縣">雲林縣</option><option value="嘉義市">嘉義市</option>
        <option value="嘉義縣">嘉義縣</option><option value="台南市">台南市</option>
        <option value="高雄市">高雄市</option><option value="屏東縣">屏東縣</option>
        <option value="台東縣">台東縣</option><option value="花蓮縣">花蓮縣</option>
        <option value="宜蘭縣">宜蘭縣</option><option value="澎湖縣">澎湖縣</option>
        <option value="金門縣">金門縣</option><option value="連江縣">連江縣</option>
      </select>
    </div>
    <div><label>場地名稱 *</label><input type="text" id="ns_venue" placeholder="場地全名"></div>
  </div>
  <label>Google Maps 連結（選填）</label>
  <input type="url" id="ns_mapurl" placeholder="https://maps.app.goo.gl/...">

  <!-- 多日期設定 -->
  <div style="font-size:14px;font-weight:700;color:var(--md);margin-top:14px;margin-bottom:7px">活動日期時間 *（可新增多天）</div>
  <div id="actDateRows"></div>
  <button type="button" onclick="addDateRow()" style="width:100%;padding:10px;background:none;border:2px dashed #c8ddc8;border-radius:9px;font-size:14px;color:var(--md);cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-bottom:10px">＋ 新增日期</button>

  <!-- 費用 -->
  <div class="fg2">
    <div><label>費用（0=免費）</label><input type="number" id="ns_fee" placeholder="500" value="0"></div>
    <div><label>計費方式</label>
      <select id="ns_fee_mode">
        <option value="場次">整場計費</option>
        <option value="每天">每天計費</option>
      </select>
    </div>
    <div><label>保證金</label><input type="number" id="ns_deposit" value="500"></div>
    <div><label>名額上限 *</label><input type="number" id="ns_limit" placeholder="30"></div>
  </div>
  <div class="fg2">
    <div><label>主辦單位</label><input type="text" id="ns_organizer" placeholder="主辦名稱" list="organizer_list"><datalist id="organizer_list"></datalist></div>
    <div><label>協辦單位</label><input type="text" id="ns_coorg" placeholder="協辦名稱（選填）" list="coorg_list"><datalist id="coorg_list"></datalist></div>
  </div>
  <div><label>基本配備說明</label><input type="text" id="ns_basicequip" placeholder="例：桌1椅1"></div>

  <!-- 設備加購 -->
  <div style="font-size:14px;font-weight:700;color:var(--md);margin-top:14px;margin-bottom:8px">設備需求開放（勾選才開放）</div>
  <div class="eq-grid">
    <div class="eq-item"><input type="checkbox" id="ns_eq_桌"><span class="eq-name">🪵 桌</span><input type="number" id="ns_ep_桌" placeholder="350" class="eq-price"></div>
    <div class="eq-item"><input type="checkbox" id="ns_eq_椅子"><span class="eq-name">🪑 椅子</span><input type="number" id="ns_ep_椅子" placeholder="20" class="eq-price"></div>
    <div class="eq-item"><input type="checkbox" id="ns_eq_桌布"><span class="eq-name">🎀 桌布</span><input type="number" id="ns_ep_桌布" placeholder="50" class="eq-price"></div>
    <div class="eq-item"><input type="checkbox" id="ns_eq_陽傘"><span class="eq-name">☂️ 陽傘</span><input type="number" id="ns_ep_陽傘" placeholder="450" class="eq-price"></div>
    <div class="eq-item"><input type="checkbox" id="ns_eq_帳篷"><span class="eq-name">⛺ 帳篷</span><input type="number" id="ns_ep_帳篷" placeholder="800" class="eq-price"></div>
    <div class="eq-item"><input type="checkbox" id="ns_eq_野餐墊"><span class="eq-name">🧺 野餐墊</span><input type="number" id="ns_ep_野餐墊" placeholder="50" class="eq-price"></div>
    <div class="eq-item"><input type="checkbox" id="ns_eq_電"><span class="eq-name">⚡ 電</span><input type="number" id="ns_ep_電" placeholder="100" class="eq-price"></div>
    <div class="eq-item"><input type="checkbox" id="ns_eq_燈"><span class="eq-name">💡 燈</span><input type="number" id="ns_ep_燈" placeholder="50" class="eq-price"></div>
    <div class="eq-item" style="border-color:#ffd0b0"><input type="checkbox" id="ns_open_fire"><span class="eq-name" style="color:#c0607a">🔥 明火申報</span></div>
    <div class="eq-item" style="border-color:#b0d0ff"><input type="checkbox" id="ns_open_power"><span class="eq-name" style="color:#2980B9">⚡ 用電申報</span></div>
  </div>

  <!-- 報名表設定 -->
  <div style="font-size:14px;font-weight:700;color:var(--md);margin-top:14px;margin-bottom:10px">📋 報名表設定</div>
  <div style="background:var(--gp);border-radius:9px;padding:10px;margin-bottom:10px">
    <div style="font-size:13px;font-weight:700;color:var(--g);margin-bottom:5px">基本資料（必填）</div>
    <div style="font-size:13px;color:var(--md)">✅ 姓名　✅ 手機　✅ Email</div>
  </div>

  <!-- 攤商報名欄位 -->
  <div style="font-size:13px;font-weight:700;color:var(--md);margin-bottom:7px">攤商報名</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbz34vXdofbWxMBSKVkDxsvSjLwI_TPlFdX420bXDmxDbNGe5cXcG2RzeeoUsGySI8Ipjw/exec';
const LS_ADMIN = 'tuibile_admin_v2';
const SITE_URL = 'https://ndiangrace-create.github.io/tuibile';

let ST = {
  role:'', email:'', sessions:[], partners:[],
  currentTab:'dash', currentSessionId:null,
  vendors:[], filter:'all'
};

// ── 工具 ──
const $ = id => document.getElementById(id);
function sl(v){ $('ov').classList.toggle('on',v); }
function toast(m){ const t=$('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2500); }
function openModal(id){
  $(id).classList.add('on');
  if(id==='mNewSession' && !window._editingSessionId) { initDateRows(); }
}
function closeModal(id){ $(id).classList.remove('on'); }
function fmtM(n){ return 'NT$'+(parseInt(n)||0).toLocaleString(); }

async function apiGet(params){
  const r=await fetch(API+'?'+new URLSearchParams(params).toString());
  return r.json();
}
async function apiPost(payload){
  const r=await fetch(API+'?data='+encodeURIComponent(JSON.stringify(payload)));
  return r.json();
}

function loadAdmin(){
  try{ const s=localStorage.getItem(LS_ADMIN); return s?JSON.parse(s):{loggedIn:false}; }
  catch(e){ return {loggedIn:false}; }
}
function saveAdmin(d){ try{ localStorage.setItem(LS_ADMIN,JSON.stringify(d)); }catch(e){} }

// ── 登入 ──
window.onload = async () => {
  const saved = loadAdmin();
  if(saved.loggedIn && saved.email){
    await initAdmin(saved.email);
  }
};

async function doAdminLogin(){
  const email=$('adminEmail').value.trim();
  if(!email||!email.includes('@')){ showLoginErr('請輸入正確 Email'); return; }
  sl(true);
  try{
    const d=await apiGet({action:'adminLogin',email});
    if(!d.authorized){ showLoginErr('此 Email 沒有管理權限'); return; }
    saveAdmin({loggedIn:true,email,role:d.role,sessions:d.sessions||[]});
    ST.sessions=d.sessions||[]; ST.role=d.role; ST.email=email;
    showMainApp();
  }catch(e){ showLoginErr('連線失敗，請稍後再試'); }
  finally{ sl(false); }
}

async function initAdmin(email){
  sl(true);
  try{
    const d=await apiGet({action:'adminLogin',email});
    if(!d.authorized){ doLogout(); return; }
    ST.sessions=d.sessions||[]; ST.role=d.role; ST.email=email;
    saveAdmin({loggedIn:true,email,role:d.role,sessions:d.sessions||[]});
    showMainApp();
  }catch(e){
    const saved=loadAdmin();
    if(saved.sessions) ST.sessions=saved.sessions;
    ST.email=email; ST.role=saved.role||'staff';
    showMainApp();
  }finally{ sl(false); }
}

function showLoginErr(msg){ const el=$('loginErr');el.textContent=msg;el.style.display='block'; }

function showMainApp(){
  $('loginPage').style.display='none';
  $('mainApp').style.display='block';
  $('adminNameDisplay').textContent=ST.email;
  loadPartners();
  switchTab('dash');
}

function cancelNewSession(){
  window._editingSessionId = null;
  const titleEl = document.querySelector('#mNewSession .mt');
  if(titleEl) titleEl.textContent = '新增場次';
  closeModal('mNewSession');
}
function doLogout(){
  saveAdmin({loggedIn:false});
  $('mainApp').style.display='none';
  $('loginPage').style.display='block';
  $('adminEmail').value='';
  const el=$('loginErr');if(el)el.style.display='none';
}

// ── 底部導航 ──
function switchTab(tab){
  ST.currentTab=tab;
  ['dash','sessions','checkin','tools'].forEach(t=>{
    const btn=$('nav-'+t);
    if(btn) btn.classList.toggle('on',t===tab);
  });
  const mc=$('mainContent');
  if(tab==='dash') renderDashboard();
  else if(tab==='sessions') renderSessionsTab();
  else if(tab==='checkin') renderCheckinWeekly();
  else if(tab==='tools') renderTools();
}

// ══ 儀表板 ══
function renderDashboard(){
  const mc=$('mainContent');
  if(!ST.sessions.length){
    mc.innerHTML=`<div class="no-sessions"><div class="ns-ic">📭</div><div class="ns-t">尚無場次</div><div class="ns-s">點下方「場次」新增第一個活動</div></div>`;
    return;
  }
  const sorted=[...ST.sessions].sort((a,b)=>(a.dateStart||'').localeCompare(b.dateStart||''));
  mc.innerHTML='<div style="font-size:15px;font-weight:700;color:var(--md);margin-bottom:8px;padding:4px 2px">場次總覽（點展開）</div>'+
    sorted.map(s=>renderSessionRow(s)).join('');
}

function renderSessionRow(s){
  const limit=parseInt(s.limit)||0;
  const remain=Math.max(0,limit-(parseInt(s.accepted)||0));
  const income=fmtM((parseInt(s.paid)||0)*(parseInt(s.fee)||0));
  const equipIcons={'帳篷':'⛺','椅子':'🪑','桌':'🪵','野餐墊':'🧺','桌布':'🎀','電':'⚡','燈':'💡','陽傘':'☂️'};
  const equipStr=s.equip?Object.entries(s.equip).filter(([,v])=>v>0).map(([k,v])=>(equipIcons[k]||'')+k+' x'+v).join('　'):'';

  return `<div class="session-row" id="sr-${s.id}">
    <div class="sr-header" onclick="toggleRow('${s.id}')">
      <div class="sr-date">${s.dateDisplay||''}</div>
      <div class="sr-name">
        <span style="font-size:12px;color:var(--md);font-weight:400;margin-right:5px">${s.city||''}</span>${s.name}
        <small>${s.venue||''}</small>
      </div>
      <div class="sr-arrow" id="arrow-${s.id}">›</div>
    </div>
    <div class="stat-chips">
      <span class="sc sc-total">報名 ${s.enrolled||0}</span>
      <span class="sc sc-paid">繳費 ${s.paid||0}</span>
      ${remain>0?`<span class="sc sc-remain">缺 ${remain}</span>`:'<span class="sc sc-remain" style="background:var(--rdp);color:var(--rd)">額滿</span>'}
      ${(s.pending||0)>0?`<span class="sc sc-pending" onclick="openSessionFilter('${s.id}','pending')">待審 ${s.pending}</span>`:''}
      <span class="sc sc-income">${income}</span>
    </div>
    <div class="sr-body" id="srb-${s.id}"></div>
  </div>`;
}

async function toggleRow(id){
  const body=$('srb-'+id);
  const arrow=$('arrow-'+id);
  if(body.classList.contains('open')){
    body.classList.remove('open');
    if(arrow) arrow.classList.remove('open');
    return;
  }
  document.querySelectorAll('.sr-body.open').forEach(b=>b.classList.remove('open'));
  document.querySelectorAll('.sr-arrow.open').forEach(a=>a.classList.remove('open'));
  body.classList.add('open');
  if(arrow) arrow.classList.add('open');
  if(!body.innerHTML.trim()) await loadSessionBody(id,body);
}

async function openSessionFilter(id, filter){
  await toggleRow(id);
  ST.filter=filter;
  setTimeout(()=>renderVendorList(),300);
}

async function loadSessionBody(id,body){
  body.innerHTML='<div class="empty">載入中...</div>';
  try{
    const [dash,vendData]=await Promise.all([
      apiGet({action:'getDashboard',sessionId:id}),
      apiGet({action:'getVendors',sessionId:id})
    ]);
    ST.currentSessionId=id;
    ST.vendors=vendData.vendors||[];
    // 更新 session 統計
    const idx=ST.sessions.findIndex(s=>s.id===id);
    if(idx>=0 && dash){
      ST.sessions[idx]={...ST.sessions[idx],
        enrolled:dash.total||0, pending:dash.pending||0,
        paid:dash.paid||0, accepted:dash.accepted||0,
        equip:dash.equipment||{}
      };
      // 更新儀表板那一行
      const rowEl=$('sr-'+id);
      if(rowEl){
        const s=ST.sessions[idx];
        const limit=parseInt(s.limit)||0;
        const remain=Math.max(0,limit-(s.accepted||0));
        const income=fmtM((s.paid||0)*(parseInt(s.fee)||0));
        const equipIcons={'帳篷':'⛺','椅子':'🪑','桌':'🪵','野餐墊':'🧺','桌布':'🎀','電':'⚡','燈':'💡','陽傘':'☂️'};
  const equipStr=s.equip?Object.entries(s.equip).filter(([,v])=>v>0).map(([k,v])=>(equipIcons[k]||'')+k+' x'+v).join('　'):'';
        const chips=rowEl.querySelector('.stat-chips');
        if(chips){
          chips.innerHTML=`
            <span class="sc sc-total">報名 ${s.enrolled||0}</span>
            <span class="sc sc-paid">繳費 ${s.paid||0}</span>
            ${remain>0?`<span class="sc sc-remain">缺 ${remain}</span>`:'<span class="sc sc-remain" style="background:var(--rdp);color:var(--rd)">額滿</span>'}
            ${(s.pending||0)>0?`<span class="sc sc-pending" onclick="openSessionFilter('${s.id}','pending')">待審 ${s.pending}</span>`:''}
            <span class="sc sc-income">${income}</span>`;
        }
      }
    }
    body.innerHTML=renderSessionDetail(dash,vendData.vendors||[],id);
    // 事件綁定
    body.querySelectorAll('[data-filter]').forEach(el=>{
      el.onclick=()=>{filterVendors(el.dataset.filter,el);};
    });
  }catch(e){ body.innerHTML='<div class="empty">載入失敗</div>'; }
}

function renderSessionDetail(d,vendors,sessionId){
  const equipKeys=['帳篷','椅子','桌','野餐墊','桌布','電','燈','陽傘'];
  const equipIcons={'帳篷':'⛺','椅子':'🪑','桌':'🪵','野餐墊':'🧺','桌布':'🎀','電':'⚡','燈':'💡','陽傘':'☂️'};
  const equipStr=equipKeys.filter(k=>(d.equipment||{})[k]>0).map(k=>equipIcons[k]+k+' x'+(d.equipment||{})[k]).join('、')||'無加購';

  return `
  <div class="filters" id="vendorFilters">
    <div class="ftab on" data-filter="all">全部</div>
    <div class="ftab" data-filter="pending">待審核</div>
    <div class="ftab" data-filter="accepted">已錄取</div>
    <div class="ftab" data-filter="waitlist">備取</div>
    <div class="ftab" data-filter="paid">已付款</div>
    <div class="ftab" data-filter="overdue">逾期</div>
  </div>
  <div style="display:flex;gap:7px;padding:8px 14px;background:var(--lt);border-bottom:1px solid var(--gp)" id="batchBar">
    <button class="btn-xs" style="background:var(--g);color:#fff" onclick="batchAccept()">✓ 批次錄取</button>
    <button class="btn-xs" style="background:var(--blp);color:#2980B9" onclick="batchEmail()">📧 批次寄信</button>
    <button class="btn-xs" style="background:var(--ylp);color:var(--yl)" onclick="batchWaitlist()">備取全部</button>
    <button class="btn-xs" style="background:var(--rdp);color:var(--rd)" onclick="batchCancel()">✗ 批次取消</button>
    <span style="font-size:15px;color:var(--md);align-self:center" id="batchCount"></span>
  </div>
  <div id="vendorList"></div>
  <div style="padding:10px 14px">
    <div style="font-size:14px;font-weight:700;color:var(--md);margin-bottom:6px">🪑 設備統計</div>
    <div style="font-size:14px;color:var(--dk)">${equipStr}</div>
  </div>`;
}

// ── 審核 ──
function filterVendors(filter,el){
  ST.filter=filter;
  document.querySelectorAll('#vendorFilters .ftab').forEach(t=>t.classList.remove('on'));
  if(el) el.classList.add('on');
  renderVendorList();
}

function renderVendorList(){
  const el=$('vendorList'); if(!el) return;
  const now=new Date();
  const ses=ST.sessions.find(s=>s.id===ST.currentSessionId);
  const deadline=ses?.deadline?new Date(ses.deadline):null;

  const filtered=ST.vendors.filter(v=>{
    const isOverdue=v.reviewStatus==='錄取'&&v.payStatus==='未付款'&&deadline&&now>deadline;
    if(ST.filter==='all') return true;
    if(ST.filter==='pending') return v.reviewStatus==='待審核';
    if(ST.filter==='accepted') return v.reviewStatus==='錄取';
    if(ST.filter==='waitlist') return v.reviewStatus==='備取';
    if(ST.filter==='paid') return v.payStatus==='已付款';
    if(ST.filter==='overdue') return isOverdue;
    return true;
  });

  if(!filtered.length){ el.innerHTML='<div class="empty">此分類無資料</div>'; return; }

  el.innerHTML=filtered.map(v=>{
    const isOverdue=v.reviewStatus==='錄取'&&v.payStatus==='未付款'&&deadline&&now>deadline;
    const stMap={'待審核':['vc-pending','b-pending','待審核'],'錄取':['vc-accepted','b-accepted','已錄取'],'備取':['vc-waitlist','b-waitlist','備取'],'不錄取':['vc-rejected','b-rejected','不錄取']};
    let [vcCls,badgeCls,badgeTxt]=stMap[v.reviewStatus]||['vc-pending','b-pending',v.reviewStatus];
    if(v.payStatus==='已付款'){vcCls='vc-paid';badgeCls='b-paid';badgeTxt='已付款';}
    if(isOverdue){vcCls='vc-overdue';badgeCls='b-overdue';badgeTxt='逾期';}

    const equipStr=Object.entries(v.equipment||{}).filter(([,q])=>q>0).map(([k,q])=>k+'x'+q).join('、');
    return `<div class="vendor-card ${vcCls}" onclick="openVendorDetail('${v.id}')">
      <div class="v-head">
        <div><div class="v-brand">${v.brand||v.name||''}</div>
        <div style="font-size:15px;color:var(--md)">${v.identityType||'攤商'}${v.category?' · '+v.category:''}</div></div>
        <span class="badge ${badgeCls}">${badgeTxt}</span>
      </div>
      <div class="v-info">📧 ${v.email} · 📱 ${v.phone||'-'}${v.booth?' · 攤'+v.booth:''}${equipStr?' · 🪑'+equipStr:''}</div>
      ${v.reviewStatus==='待審核'?`<div class="act-row">
        <button class="act-btn act-accept" onclick="event.stopPropagation();doStatus('${v.id}','錄取')">✓ 錄取</button>
        <button class="act-btn act-wait" onclick="event.stopPropagation();doStatus('${v.id}','備取')">備取</button>
        <button class="act-btn act-reject" onclick="event.stopPropagation();doStatus('${v.id}','不錄取')">✗ 不錄</button>
      </div>`:''}
      ${(v.reviewStatus==='錄取'||v.payStatus==='已付款')?`<div style="margin-top:8px"><button class="btn-xs" style="background:var(--rdp);color:var(--rd)" onclick="event.stopPropagation();doCancelReg('${v.id}','${v.brand.replace(/'/g,'')}',${v.deposit||0})">取消場次</button></div>`:''}
    </div>`;
  }).join('');
}

async function doStatus(vendorId,status){
  sl(true);
  try{
    const d=await apiPost({action:'updateStatus',vendorId,status,sessionId:ST.currentSessionId});
    if(d.success){toast(status==='錄取'?'✅ 已錄取，通知信已寄出':'已更新');await reloadSession();}
    else toast('更新失敗：'+(d.message||''));
  }catch(e){toast('操作失敗');}finally{sl(false);}
}

async function reloadSession(){
  if(!ST.currentSessionId) return;
  const body=$('srb-'+ST.currentSessionId);
  if(body){body.innerHTML='';await loadSessionBody(ST.currentSessionId,body);}
}

// ── 攤商詳情 ──
function openVendorDetail(id){
  const v=ST.vendors.find(x=>x.id===id); if(!v) return;
  const eStr=Object.entries(v.equipment||{}).filter(([,q])=>q>0).map(([k,q])=>k+'x'+q).join('、')||'無';
  $('vendorDetailContent').innerHTML=`
    <div style="font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;margin-bottom:4px">${v.brand||v.name}</div>

// ── 批次操作 ══
async function batchAccept() {
  const pending = ST.vendors.filter(v => v.reviewStatus === '待審核');
  if(!pending.length){toast('沒有待審核的報名');return;}
  if(!confirm(`確定批次錄取 ${pending.length} 筆？系統將逐一寄送錄取通知信。`)) return;
  sl(true);
  let ok = 0;
  try {
    for(const v of pending) {
      const d = await apiPost({action:'updateStatus', vendorId:v.id, status:'錄取', sessionId:ST.currentSessionId});
      if(d.success) ok++;
    }
    toast(`✅ 已批次錄取 ${ok} 筆，通知信已寄出`);
    await reloadSession();
  } catch(e){toast('操作失敗');}
  finally{sl(false);}
}

async function batchCancel() {
  const accepted = ST.vendors.filter(v => v.reviewStatus === '錄取');
  if(!accepted.length){toast('沒有已錄取的報名');return;}
  if(!confirm(`確定批次取消 ${accepted.length} 筆錄取？此操作不可復原。`)) return;
  const reason = prompt('請輸入取消原因：');
  if(!reason) return;
  sl(true);
  let ok = 0;
  try {
    for(const v of accepted) {
      const d = await apiPost({action:'cancelRegistration', regId:v.id, reason, sessionName:ST.sessions.find(s=>s.id===ST.currentSessionId)?.name||''});
      if(d.success) ok++;
    }
    toast(`✅ 已批次取消 ${ok} 筆`);
    await reloadSession();
  } catch(e){toast('操作失敗');}
  finally{sl(false);}
}

// ── 取消場次 ──
async function doCancelReg(regId,brand,deposit){
  const ses=ST.sessions.find(s=>s.id===ST.currentSessionId);
  const now=new Date();
  let refundNote='';
  if(ses?.dateStart){
    const d=new Date(ses.dateStart);
    const diff=Math.ceil((d-now)/86400000);
    if(diff>20) refundNote='活動前20日以上：扣NT$100後退還';
    else if(diff>10) refundNote='活動前10日：扣NT$500後退還';
    else if(diff>7) refundNote='活動前7日：退50%';
    else refundNote='活動前5日內：不退費';
  }
  const reason=prompt(`取消「${brand}」的報名？

💰 退費政策：
${refundNote}

請輸入取消原因：`);
  if(reason===null) return;
  if(!reason.trim()){toast('請輸入原因');return;}
  sl(true);
  try{
    const d=await apiPost({action:'cancelRegistration',regId,reason:reason.trim(),deposit,sessionName:ses?.name||''});
    if(d.success){toast('✅ 已取消，通知信已寄出');await reloadSession();}
    else toast('操作失敗：'+(d.message||''));
  }catch(e){toast('操作失敗');}finally{sl(false);}
}

async function downloadAllSessions(){

  sl(true);
  try{
    for(const s of ST.sessions){
      const d=await apiGet({action:'getVendors',sessionId:s.id});
      const vendors=d.vendors||[];
      if(!vendors.length) continue;
      exportCSV(vendors,s.name+'_完整名單');

    }
    toast('全部下載完成');
  }catch(e){toast('下載失敗');}finally{sl(false);}
}


function exportCSV(vendors,filename,type){
  const NL=String.fromCharCode(10);
  const COMMA=',';
  let headers,rows;
  if(type==='checkin'){
    headers=['攤位','品牌','身份','Email','手機','審核','付款'];
    rows=vendors.filter(v=>v.payStatus==='已付款').map(v=>[v.booth||'-',v.brand,v.identityType||'攤商',v.email,v.phone||'',v.reviewStatus,v.payStatus]);
  }else if(type==='equip'){
    headers=['品牌','帳篷','椅子','桌','野餐墊','桌布','電','燈','陽傘'];
    rows=vendors.filter(v=>Object.values(v.equipment||{}).some(q=>q>0)).map(v=>[v.brand,...['帳篷','椅子','桌','野餐墊','桌布','電','燈','陽傘'].map(k=>v.equipment[k]||0)]);
  }else{
    headers=['品牌','代表人','身份','Email','手機','類別','審核','付款','攤位','攤數','設備','明火','用電','報名時間','應付','押金'];
    rows=vendors.map(v=>[v.brand,v.name||'',v.identityType||'攤商',v.email,v.phone||'',v.category||'',v.reviewStatus,v.payStatus,v.booth||'',v.boothCount||1,Object.entries(v.equipment||{}).filter(([,q])=>q>0).map(([k,q])=>k+'x'+q).join(' ')||'無',v.fire==='yes'?'是':'否',v.power||'',v.regTime||'',v.totalFee||'',v.deposit||'']);
  }
  const q=c=>('"'+String(c||'').replace(/"/g,'""')+'"');
  const csvRows=[headers,...rows].map(r=>r.map(q).join(COMMA));
  const csv='﻿'+csvRows.join(NL);
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=filename+'_'+new Date().toLocaleDateString('zh-TW').replace(/\//g,'')+'.csv';
  a.click();
  URL.revokeObjectURL(url);
}

  if(!ST.currentSessionId){toast('請先在儀表板選擇場次');return;}
  sl(true);
  try{
    const d=await apiGet({action:'getVendors',sessionId:ST.currentSessionId});
    const vendors=d.vendors||[];
    const s=ST.sessions.find(x=>x.id===ST.currentSessionId)||{name:'場次'};
    let headers=[],rows=[];
    if(type==='checkin'){
      headers=['攤位','品牌','身份','Email','手機','審核','付款','進場','清場','押金退還'];
      rows=vendors.filter(v=>v.payStatus==='已付款').map(v=>[v.booth||'-',v.brand,v.identityType||'攤商',v.email,v.phone||'',v.reviewStatus,v.payStatus,'','',v.refundStatus||'未退']);
    }else if(type==='roster'){
      headers=['品牌','代表人','身份','Email','手機','類別','審核','付款','攤位','攤數','設備','明火','用電','報名時間','應付','押金'];
      rows=vendors.map(v=>[v.brand,v.name||'',v.identityType||'攤商',v.email,v.phone||'',v.category||'',v.reviewStatus,v.payStatus,v.booth||'',v.boothCount||1,Object.entries(v.equipment||{}).filter(([,q])=>q>0).map(([k,q])=>k+'x'+q).join('、')||'無',v.fire==='yes'?'是':'否',v.power||'',v.regTime||'',v.totalFee||'',v.deposit||'']);
    }else if(type==='equip'){
      headers=['品牌','帳篷','椅子','桌','野餐墊','桌布','電','燈','陽傘'];
      rows=vendors.filter(v=>Object.values(v.equipment||{}).some(q=>q>0)).map(v=>[v.brand,...['帳篷','椅子','桌','野餐墊','桌布','電','燈','陽傘'].map(k=>v.equipment[k]||0)]);
    }
    exportCSV(vendors,s.name+'_'+type,type);
    toast('下載完成');
  }catch(e){toast('下載失敗');}finally{sl(false);}
}

<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>2BLV1｜平台管理入口</title>
<meta name="theme-color" content="#111827">
<style>
:root{
  --ink:#172033; --muted:#6b7280; --line:#e8eaf0; --paper:#f6f7fb;
  --card:rgba(255,255,255,.88); --accent:#7457d9; --accent2:#ec8aa8;
  --shadow:0 24px 70px rgba(33,38,62,.14);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;color:var(--ink);background:
 radial-gradient(circle at 12% 12%,rgba(236,138,168,.18),transparent 28%),
 radial-gradient(circle at 86% 18%,rgba(116,87,217,.18),transparent 30%),
 linear-gradient(145deg,#f9f5f7 0%,#f4f5fb 46%,#edf1f8 100%);}
body{min-height:100vh}
.shell{width:min(1160px,calc(100% - 28px));margin:auto;padding:28px 0 48px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:26px}
.brand{display:flex;align-items:center;gap:13px}
.logo{width:46px;height:46px;border-radius:15px;display:grid;place-items:center;color:white;font-weight:900;letter-spacing:.5px;
background:linear-gradient(145deg,var(--accent),#9b7ceb);box-shadow:0 12px 24px rgba(116,87,217,.27)}
.brand h1{font-size:20px;margin:0}.brand p{font-size:12px;color:var(--muted);margin:3px 0 0}
.user{display:none;align-items:center;gap:10px;background:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.9);padding:8px 10px;border-radius:16px;box-shadow:0 10px 30px rgba(50,55,80,.08)}
.user.show{display:flex}.avatar{width:32px;height:32px;border-radius:11px;background:#ece8fb;display:grid;place-items:center;font-weight:900;color:var(--accent)}
.user b{font-size:13px}.user small{display:block;color:var(--muted);font-size:11px}
.hero{position:relative;overflow:hidden;background:var(--card);border:1px solid rgba(255,255,255,.92);border-radius:32px;padding:38px;box-shadow:var(--shadow);backdrop-filter:blur(16px)}
.hero:after{content:"";position:absolute;right:-80px;top:-110px;width:280px;height:280px;border-radius:50%;background:linear-gradient(145deg,rgba(116,87,217,.22),rgba(236,138,168,.14))}
.kicker{display:inline-flex;align-items:center;gap:8px;padding:7px 11px;border-radius:999px;background:#f1edff;color:#6548c3;font-size:12px;font-weight:800}
.hero h2{font-size:clamp(30px,5vw,54px);line-height:1.08;margin:20px 0 12px;max-width:720px;letter-spacing:-1.5px}
.hero p{font-size:15px;line-height:1.8;color:var(--muted);max-width:680px;margin:0}
.actions{margin-top:28px;display:flex;gap:12px;flex-wrap:wrap}
.btn{border:0;border-radius:15px;padding:13px 18px;font-weight:900;font-size:14px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:linear-gradient(135deg,var(--accent),#9271e8);color:#fff;box-shadow:0 12px 24px rgba(116,87,217,.25)}
.btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
.status{margin-top:18px;font-size:13px;color:var(--muted);min-height:20px}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:34px 2px 16px}
.section-head h3{margin:0;font-size:19px}.section-head p{margin:4px 0 0;color:var(--muted);font-size:13px}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.tenant{background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.95);border-radius:24px;padding:20px;box-shadow:0 16px 44px rgba(40,45,68,.09);transition:.18s ease;position:relative;overflow:hidden}
.tenant:hover{transform:translateY(-3px);box-shadow:0 20px 50px rgba(40,45,68,.14)}
.tenant .tag{font-size:11px;font-weight:900;color:#6853b9;background:#f0ecff;padding:6px 9px;border-radius:999px;display:inline-block}
.tenant h4{font-size:20px;margin:16px 0 6px}.tenant .meta{font-size:12px;color:var(--muted);line-height:1.7;min-height:42px}
.tenant .foot{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:14px;border-top:1px solid var(--line)}
.state{font-size:11px;font-weight:900;padding:6px 8px;border-radius:999px}.active{color:#147452;background:#e5f7ef}.locked{color:#a23a4c;background:#fdecef}
.enter{border:0;background:#182033;color:white;border-radius:12px;padding:9px 12px;font-weight:900;cursor:pointer}
.empty{grid-column:1/-1;text-align:center;padding:42px;border:1px dashed #cfd3df;border-radius:24px;color:var(--muted);background:rgba(255,255,255,.55)}
.platform-tools{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px}
.tool{background:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.9);padding:15px;border-radius:18px}
.tool b{font-size:13px}.tool span{display:block;color:var(--muted);font-size:11px;margin-top:5px}
.hidden{display:none!important}
@media(max-width:820px){.grid{grid-template-columns:1fr}.platform-tools{grid-template-columns:1fr}.hero{padding:26px}.topbar{align-items:flex-start}.user{max-width:54%;overflow:hidden}}
</style>
</head>
<body>
<main class="shell">
  <header class="topbar">
    <div class="brand">
      <div class="logo">2B</div>
      <div><h1>2BLV1</h1><p>平台總管理中心</p></div>
    </div>
    <div class="user" id="userBox">
      <div class="avatar" id="avatar">A</div>
      <div><b id="userName">平台管理員</b><small id="userEmail"></small></div>
    </div>
  </header>

  <section class="hero">
    <span class="kicker">✦ SaaS PLATFORM</span>
    <h2>一個入口，管理每一個品牌。</h2>
    <p>此頁僅供 2BLV1 平台總管理者使用。登入後可查看所有租戶、切換品牌後台，並進行租戶與方案管理。</p>
    <div class="actions">
      <button class="btn btn-primary" id="loginBtn">使用 Google 登入</button>
      <button class="btn btn-ghost hidden" id="logoutBtn">登出</button>
    </div>
    <div class="status" id="status">尚未登入</div>
  </section>

  <section id="tenantSection" class="hidden">
    <div class="section-head">
      <div><h3>租戶空間</h3><p>選擇要進入的品牌後台</p></div>
      <button class="btn btn-ghost" id="refreshBtn">重新整理</button>
    </div>
    <div class="grid" id="tenantGrid"></div>

    <div class="platform-tools">
      <div class="tool"><b>租戶開通</b><span>新增品牌、設定試用與管理員</span></div>
      <div class="tool"><b>方案與帳單</b><span>查看方案、鎖定狀態與費用</span></div>
      <div class="tool"><b>平台監控</b><span>查看租戶數量與系統異常</span></div>
    </div>
  </section>
</main>

<script>
const API = 'https://tobeloved-api.ndiangrace.workers.dev';
const TOKEN_KEY = '2blv1_platform_token';

const $ = id => document.getElementById(id);
const loginBtn = $('loginBtn'), logoutBtn = $('logoutBtn'), statusEl = $('status');

function getToken(){
  const u = new URL(location.href);
  const incoming = u.searchParams.get('admin_token');
  if(incoming){
    localStorage.setItem(TOKEN_KEY,incoming);
    u.searchParams.delete('admin_token');
    history.replaceState({},'',u.toString());
    return incoming;
  }
  return localStorage.getItem(TOKEN_KEY)||'';
}
function setStatus(t){ statusEl.textContent=t; }

loginBtn.onclick = () => {
  location.href = API + '/auth/google/start?tenant=platform';
};
logoutBtn.onclick = () => {
  localStorage.removeItem(TOKEN_KEY);
  location.reload();
};
$('refreshBtn').onclick = loadTenants;

async function apiGet(action, params={}){
  const u = new URL(API);
  u.searchParams.set('action',action);
  Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,v));
  const r = await fetch(u,{cache:'no-store'});
  const j = await r.json().catch(()=>({error:'回傳格式錯誤'}));
  if(!r.ok || j.error) throw new Error(j.error||('HTTP '+r.status));
  return j;
}
async function verifyPlatform(token){
  const me = await apiGet('adminMe',{token,email:'__jwt__',tenant:'platform'}).catch(async()=>{
    return apiGet('admin/me',{token,email:'__jwt__',tenant:'platform'});
  });
  const role = me.normalized_role || me.role || '';
  if(role !== 'platform_super_admin') throw new Error('此帳號不是平台總管理者');
  return me;
}
async function loadTenants(){
  const token = getToken();
  if(!token) return;
  setStatus('正在載入租戶…');
  try{
    const rows = await apiGet('getTenantsAdmin',{token,tenant:'platform'});
    renderTenants(Array.isArray(rows)?rows:(rows.data||[]),token);
    setStatus('已載入 '+(Array.isArray(rows)?rows.length:(rows.data||[]).length)+' 個租戶');
  }catch(e){ setStatus('租戶載入失敗：'+e.message); }
}
function renderTenants(rows,token){
  const grid=$('tenantGrid');
  if(!rows.length){grid.innerHTML='<div class="empty">目前沒有租戶</div>';return}
  grid.innerHTML=rows.map(t=>{
    const locked=!!t.is_locked;
    const type=(t.event_type||t.plan_type||'租戶').toString();
    return `<article class="tenant">
      <span class="tag">${escapeHtml(type)}</span>
      <h4>${escapeHtml(t.name||t.id)}</h4>
      <div class="meta">租戶代碼：${escapeHtml(t.id||'')}<br>方案：${escapeHtml(t.plan_type||'未設定')}</div>
      <div class="foot">
        <span class="state ${locked?'locked':'active'}">${locked?'已鎖定':'使用中'}</span>
        <button class="enter" onclick="enterTenant('${encodeURIComponent(t.id)}')">進入後台 →</button>
      </div>
    </article>`;
  }).join('');
}
function enterTenant(encoded){
  const tenant=decodeURIComponent(encoded);
  const token=getToken();
  const u=new URL('admin.html',location.href);
  u.searchParams.set('tenant',tenant);
  u.searchParams.set('admin_token',token);
  location.href=u.toString();
}
function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

(async function init(){
  const token=getToken();
  if(!token) return;
  try{
    setStatus('正在驗證平台權限…');
    const me=await verifyPlatform(token);
    $('userBox').classList.add('show');
    $('userName').textContent=me.display_name||'平台管理員';
    $('userEmail').textContent=me.email||'';
    $('avatar').textContent=(me.display_name||me.email||'A').slice(0,1).toUpperCase();
    loginBtn.classList.add('hidden');
    logoutBtn.classList.remove('hidden');
    $('tenantSection').classList.remove('hidden');
    setStatus('平台管理者驗證成功');
    await loadTenants();
  }catch(e){
    localStorage.removeItem(TOKEN_KEY);
    setStatus('登入失效：'+e.message);
  }
})();
</script>
</body>
</html>
